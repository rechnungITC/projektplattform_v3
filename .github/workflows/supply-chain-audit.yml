name: Supply Chain Audit

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: supply-chain-audit-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  npm-audit:
    name: npm audit production dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependency tree
        run: npm run audit:prod

  snyk:
    name: Snyk production dependency scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Snyk test
        if: ${{ env.SNYK_TOKEN != '' }}
        run: npx snyk test --severity-threshold=high --fail-on=all

      - name: Snyk token not configured
        if: ${{ env.SNYK_TOKEN == '' }}
        run: |
          echo "::warning::SNYK_TOKEN is not configured. Add the repository secret, then mark this job as a required check in branch protection."
