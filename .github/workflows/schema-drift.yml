name: Schema Drift Guard

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Auto-cancel duplicate runs on the same PR ref.
concurrency:
  group: schema-drift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Verify SELECT columns vs migration schema
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Provision Supabase stubs (roles, schemas, extensions, helpers)
        env:
          PGPASSWORD: test
        run: |
          set -euo pipefail
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 <<'SQL'
          -- Roles. Postgres has no `create role if not exists`, hence DO-block.
          do $$ begin
            if not exists (select 1 from pg_roles where rolname = 'anon') then
              create role anon nologin;
            end if;
            if not exists (select 1 from pg_roles where rolname = 'authenticated') then
              create role authenticated nologin;
            end if;
            if not exists (select 1 from pg_roles where rolname = 'service_role') then
              create role service_role nologin;
            end if;
          end $$;

          -- auth schema + minimal table + helper functions used by RLS policies.
          create schema if not exists auth;
          create table if not exists auth.users (
            id uuid primary key default gen_random_uuid(),
            email text,
            created_at timestamptz default now()
          );
          create or replace function auth.uid() returns uuid
            language sql stable
            as $$ select null::uuid $$;
          create or replace function auth.jwt() returns jsonb
            language sql stable
            as $$ select '{}'::jsonb $$;
          create or replace function auth.role() returns text
            language sql stable
            as $$ select 'service_role'::text $$;

          -- extensions schema for Supabase-managed extensions (e.g. moddatetime).
          create schema if not exists extensions;
          create extension if not exists moddatetime schema extensions;

          -- storage schema stubs — minimum columns for FK references and policies.
          create schema if not exists storage;
          create table if not exists storage.buckets (
            id text primary key,
            name text,
            public boolean default false,
            owner uuid,
            created_at timestamptz default now(),
            updated_at timestamptz default now()
          );
          create table if not exists storage.objects (
            id uuid primary key default gen_random_uuid(),
            bucket_id text references storage.buckets(id),
            name text,
            owner uuid,
            metadata jsonb,
            created_at timestamptz default now(),
            updated_at timestamptz default now()
          );
          alter table storage.objects enable row level security;
          SQL

      - name: Apply migrations
        env:
          PGPASSWORD: test
        run: |
          set -uo pipefail
          shopt -s nullglob
          count=0
          warnings=0
          failures=0
          mkdir -p /tmp/drift-apply
          for f in supabase/migrations/*.sql; do
            base=$(basename "$f")
            log=/tmp/drift-apply/${base}.log
            if psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f "$f" > "$log" 2>&1; then
              count=$((count + 1))
            else
              # Tolerate the known-harmless pattern: REVOKE/GRANT on a function
              # that doesn't exist in this fresh-apply order (migration drift
              # pre-existing in the repo, not something for the drift-guard to
              # catch). Any other failure is a real structural error.
              if grep -qE "ERROR:.*function.*does not exist" "$log"; then
                echo "::warning file=supabase/migrations/${base}::REVOKE/GRANT on missing function — pre-existing migration drift, harmless for schema-drift check."
                warnings=$((warnings + 1))
              else
                echo "::error file=supabase/migrations/${base}::Migration failed with structural error:"
                tail -10 "$log"
                failures=$((failures + 1))
              fi
            fi
          done
          echo "Applied $count migration(s); $warnings tolerated REVOKE-warnings; $failures structural failures."
          if [ "$failures" -gt 0 ]; then
            echo "::error::$failures structural migration failures — drift check cannot run reliably."
            exit 1
          fi

      - name: Sanity-check applied schema
        env:
          PGPASSWORD: test
        run: |
          set -euo pipefail
          # Lower bound: a healthy fresh-apply has ≥ 50 tables in public.
          # If we got fewer, something more than REVOKE warnings broke.
          count=$(psql -h localhost -U postgres -d postgres -tAc "select count(*) from information_schema.tables where table_schema='public' and table_type='BASE TABLE'")
          echo "Public-schema base table count: $count"
          if [ "$count" -lt 50 ]; then
            echo "::error::Schema sanity check failed: only $count tables in public schema (expected ≥ 50). Migrations did not apply cleanly."
            exit 1
          fi

      - name: Run schema-drift check
        env:
          DATABASE_URL: postgres://postgres:test@localhost:5432/postgres
        run: npm run check:schema-drift
